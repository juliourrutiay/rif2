<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Rifa Verde</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow background-glow-left"></div>
    <div class="background-glow background-glow-right"></div>

    <header class="topbar container">
      <div class="brand-wrap">
        <span class="brand-dot"></span>
        <span class="brand">Rifa Verde Admin</span>
      </div>
      <nav class="topnav">
        <a href="./index.html">Volver a la rifa</a>
      </nav>
    </header>

    <main class="page container">
      <section class="card section-card admin-shell">
        <div class="section-head compact">
          <div>
            <span class="section-kicker">Panel administrador</span>
            <h2>Revisión rápida y exportación</h2>
          </div>
        </div>

        <div class="admin-login">
          <label>
            Token administrador
            <input id="adminToken" type="password" placeholder="Ingresa tu token" />
          </label>
          <button id="loadAdminBtn" class="primary-btn" type="button">Cargar datos</button>
          <a id="downloadCsvLink" class="ghost-btn" href="#" target="_blank" rel="noreferrer">Exportar CSV</a>
        </div>

        <div class="admin-grid-top">
          <div class="metric-box">
            <span>Total</span>
            <strong id="metricTotal">0</strong>
          </div>
          <div class="metric-box">
            <span>Pagados</span>
            <strong id="metricPaid">0</strong>
          </div>
          <div class="metric-box">
            <span>Reservados</span>
            <strong id="metricReserved">0</strong>
          </div>
          <div class="metric-box">
            <span>Disponibles</span>
            <strong id="metricAvailable">0</strong>
          </div>
        </div>

        <div style="margin: 24px 0; padding: 18px; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;">
          <h3 style="margin-top:0;">Editar número</h3>

          <div style="display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:12px;">
            <label>
              Número
              <input id="editNumber" type="number" placeholder="Ej. 15" />
            </label>

            <label>
              Estado
              <select id="editStatus">
                <option value="available">available</option>
                <option value="reserved">reserved</option>
                <option value="paid">paid</option>
              </select>
            </label>

            <label>
              Nombre
              <input id="editPayerName" type="text" placeholder="Nombre comprador" />
            </label>

            <label>
              Celular
              <input id="editPayerPhone" type="text" placeholder="Celular" />
            </label>

            <label>
              Mail
              <input id="editPayerEmail" type="email" placeholder="Mail" />
            </label>

            <label>
              RUT
              <input id="editPayerRut" type="text" placeholder="RUT" />
            </label>

            <label>
              Canal de pago
              <input id="editPaymentChannel" type="text" placeholder="manual / khipu" />
            </label>

            <label>
              ID pago
              <input id="editPaymentId" type="text" placeholder="payment_id" />
            </label>

            <label>
              ID transacción
              <input id="editTransactionId" type="text" placeholder="transaction_id" />
            </label>

            <label>
              Reservado hasta
              <input id="editReservedUntil" type="text" placeholder="2026-04-11T15:00:00.000Z" />
            </label>
          </div>

          <div style="margin-top:12px;">
            <label style="display:block;">
              Notas
              <textarea id="editNotes" rows="3" placeholder="Notas internas"></textarea>
            </label>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
            <button id="saveTicketBtn" class="primary-btn" type="button">Guardar cambios</button>
            <button id="clearTicketFormBtn" class="ghost-btn" type="button">Limpiar formulario</button>
          </div>
        </div>

        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Número</th>
                <th>Estado</th>
                <th>Nombre</th>
                <th>Celular</th>
                <th>Mail</th>
                <th>Canal</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>

        <p id="adminStatus" class="status-message">
          Ingresa tu token para consultar la información.
        </p>

        <div style="margin-top: 40px;">
          <h3>Gestión de premios</h3>

          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
            <input id="prizeTitle" placeholder="Título" />
            <input id="prizeDesc" placeholder="Descripción" />
            <input id="prizeImg" placeholder="URL Imagen" />
            <button id="addPrizeBtn" class="primary-btn" type="button">Agregar premio</button>
          </div>

          <div id="prizeList"></div>
        </div>
      </section>
    </main>

    <script src="./admin.js" type="module"></script>
  </body>
</html>
